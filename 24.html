<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prezent dla Ciebie!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Lilita+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Tekstura pogniecionego papieru w tle */
            background-color: #f2efe9;
            background-image: url('https://www.transparenttextures.com/patterns/crushed-paper-dark.png');
            font-family: "Fredoka", sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 500px;
            width: 100%;
        }

        /* Sekcja z urokliwym kotkiem/misiem i serduszkami */
        .illustration-container {
            position: relative;
            width: 240px;
            height: 240px;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Generowanie uroczego zwierzątka za pomocą czystego CSS */
        .cute-character {
            position: relative;
            width: 150px;
            height: 140px;
            background: #ffffff;
            border: 4px solid #1a1a1a;
            border-radius: 70px 70px 60px 60px;
            margin-top: 40px;
            box-shadow: 0 8px 0 rgba(0,0,0,0.05);
            z-index: 2;
        }

        /* Uszy */
        .cute-character::before, .cute-character::after {
            content: '';
            position: absolute;
            top: -15px;
            width: 45px;
            height: 45px;
            background: #ffffff;
            border: 4px solid #1a1a1a;
            border-radius: 50%;
            z-index: -1;
        }
        .cute-character::before { left: 10px; }
        .cute-character::after { right: 10px; }

        /* Wnętrze uszu (różowe) */
        .ear-inner-left, .ear-inner-right {
            position: absolute;
            top: -5px;
            width: 25px;
            height: 25px;
            background: #ffb6c1;
            border-radius: 50%;
            z-index: 1;
        }
        .ear-inner-left { left: 20px; }
        .ear-inner-right { right: 20px; }

        /* Twarz: Oczy i Nosek */
        .face {
            position: absolute;
            top: 55px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 40px;
        }

        .eye {
            position: absolute;
            width: 16px;
            height: 16px;
            background: #1a1a1a;
            border-radius: 50%;
        }
        .eye.left { left: 10px; }
        .eye.right { right: 10px; }

        .mouth-nose {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            font-weight: bold;
            color: #1a1a1a;
            line-height: 1;
            user-select: none;
        }

        /* Rumieńce */
        .blush {
            position: absolute;
            top: 62px;
            width: 28px;
            height: 18px;
            background: #ff7b90;
            border-radius: 50%;
            opacity: 0.8;
        }
        .blush.left { left: -5px; }
        .blush.right { right: -5px; }

        /* Łapki z przodu */
        .paws {
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 110px;
            display: flex;
            justify-content: space-between;
            z-index: 3;
        }
        .paw {
            width: 26px;
            height: 20px;
            background: #ffffff;
            border: 4px solid #1a1a1a;
            border-bottom: none;
            border-radius: 12px 12px 0 0;
        }

        /* Elementy tła: Serduszka i Kwiatuszki */
        .bg-element {
            position: absolute;
            z-index: 1;
        }

        /* Duże różowe uszy/serca w tle z oryginalnego zdjęcia */
        .bg-heart-left {
            left: -10px;
            bottom: 30px;
            width: 60px;
            height: 60px;
            background: #ffb3c1;
            border-radius: 50%;
            opacity: 0.9;
        }
        .bg-heart-right {
            right: -10px;
            bottom: 35px;
            width: 65px;
            height: 65px;
            background: #ffb3c1;
            border-radius: 50%;
            opacity: 0.9;
        }

        /* Małe ozdoby nad głową */
        .decorations {
            position: absolute;
            top: 10px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .deco-item {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .deco-1 { background: #d1b3ff; color: white; transform: rotate(-15deg); }
        .deco-2 { background: #ff8566; color: white; font-size: 14px; }
        .deco-3 { background: #66b3ff; color: white; transform: rotate(15deg); }

        /* Teksty */
        h1 {
            font-family: 'Lilita One', cursive;
            color: #991414;
            font-size: 3.2rem;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        p {
            color: #665c54;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 35px;
            text-transform: uppercase;
        }

        /* Przyciski */
        .buttons-container {
            display: flex;
            justify-content: center;
            gap: 25px;
        }

        .btn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            color: #ffffff;
            background-color: #a62424;
            box-shadow: 0 6px 0 #731414, 0 10px 15px rgba(0,0,0,0.15);
            transition: all 0.1s ease;
        }

        /* Efekt kliknięcia (push down) */
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #731414, 0 4px 6px rgba(0,0,0,0.15);
        }

        /* Drobna modyfikacja koloru dla X i Ptaszka jeśli chcesz je rozróżnić, 
           ale na zdjęciu oba są ciemnoczerwone */
        .btn-no {
            background-color: #b82323;
            box-shadow: 0 6px 0 #801414, 0 10px 15px rgba(0,0,0,0.15);
        }
        .btn-no:active {
            box-shadow: 0 2px 0 #801414, 0 4px 6px rgba(0,0,0,0.15);
        }

        .btn-yes {
            background-color: #a62424;
            box-shadow: 0 6px 0 #731414, 0 10px 15px rgba(0,0,0,0.15);
        }
        .btn-yes:active {
            box-shadow: 0 2px 0 #731414, 0 4px 6px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="illustration-container">
            <div class="bg-element bg-heart-left"></div>
            <div class="bg-element bg-heart-right"></div>
            
            <div class="decorations">
                <div class="deco-item deco-1"><i class="fa-solid : opacity: 0.7; fa-star"></i></div>
                <div class="deco-item deco-2"><i class="fa-solid fa-heart"></i></div>
                <div class="deco-item deco-3"><i class="fa-solid fa-snowflake"></i></div>
            </div>

            <div class="cute-character">
                <div class="ear-inner-left"></div>
                <div class="ear-inner-right"></div>
                <div class="face">
                    <div class="eye left"></div>
                    <div class="eye right"></div>
                    <div class="blush left"></div>
                    <div class="blush right"></div>
                    <div class="mouth-nose">.ω.</div>
                </div>
                <div class="paws">
                    <div class="paw"></div>
                    <div class="paw"></div>
                </div>
            </div>
        </div>

        <h1>Hey Baby!</h1>
        <p>Would you like to see your gift?</p>

        <div class="buttons-container">
            <button class="btn btn-no" onclick="alert('Oł, na pewno? 🥺')">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <button class="btn btn-yes" onclick="alert('Niespodzianka! 🎉 (Tutaj możesz dodać kolejny krok)')">
                <i class="fa-solid fa-check"></i>
            </button>
        </div>
    </div>

</body>
</html>
