<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kocham Cię Oliwia ❤️</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html, body{
  height:100%;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

/* TŁO */
body{
  background: linear-gradient(135deg, #ff4d6d, #ff8fab, #ffc2d1);
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

/* TEKSTURA */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url("back.jpg") repeat;
  background-size:5100px;
  opacity:0.18;
  pointer-events:none;
  z-index:0;
}

/* BLOOM TŁA */
.bg-glow{
  position:absolute;
  width:500px;
  height:500px;
  background:rgba(255,255,255,0.15);
  filter:blur(120px);
  border-radius:50%;
  animation:pulse 5s infinite alternate;
  z-index:0;
}

@keyframes pulse{
  from{transform:scale(1);}
  to{transform:scale(1.3);}
}

/* KARTA */
.card{
  position:relative;
  z-index:2;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(12px);
  padding:35px;
  border-radius:30px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  border:1px solid rgba(255,255,255,0.2);
  animation:floatCard 4s ease-in-out infinite;
}

@keyframes floatCard{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

h1{
  color:white;
  font-size:2.5em;
  margin-bottom:15px;
  text-shadow:0 4px 10px rgba(0,0,0,0.3);
}

p{
  color:white;
  margin-top:10px;
  font-size:1.1em;
}

/* KOT */
.cat{
  width:220px;
  border-radius:20px;
  box-shadow:0 8px 20px rgba(0,0,0,0.25);
  transition:0.4s;
}

.cat:hover{
  transform:scale(1.05) rotate(2deg);
}

/* PRZYCISK */
.love-btn{
  margin-top:20px;
  border:none;
  background:linear-gradient(180deg,#fff,#ffeef2);
  color:#ff2f57;
  padding:14px 30px;
  border-radius:30px;
  font-size:1.05rem;
  font-weight:800;
  cursor:pointer;
  transition:0.18s ease;
  box-shadow:0 10px 22px rgba(0,0,0,0.16);
}

.love-btn:hover{
  transform:translateY(-4px) scale(1.03);
}

/* COUNTER */
#counter{
  color:white;
  font-size:1.1em;
  margin-top:15px;
  font-weight:bold;
}

/* SERCA */
.heart{
  position:fixed;
  color:white;
  pointer-events:none;
  opacity:0.7;
  animation:floatUp linear forwards;
  z-index:1;
}

@keyframes floatUp{
  0%{transform:translateY(100vh); opacity:0;}
  20%{opacity:1;}
  100%{transform:translateY(-10vh); opacity:0;}
}
</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="card">

  <h1>Kocham Cię Oliwka ❤️</h1>

  <img class="cat"
    src="https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExcGhxajNycmt1ZnduZHJnb25jZXAyYXB1cWd4b2U4eTFoaHF6N2ppNCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/KztT2c4u8mYYUiMKdJ/giphy.gif">

  <p>Jesteś najpiękniejszą kobietą na świecie 💖</p>

  <div id="counter"></div>

  <a href="index2.html">
    <button class="love-btn">Kliknij ❤️</button>
  </a>

  <a href="index3.html">
    <button class="love-btn">Na zly dzien ❤️</button>
  </a>

</div>

<script>

/* SERCA */
function createHeart(){
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";

  heart.style.left = Math.random()*100 + "vw";
  heart.style.fontSize = (10 + Math.random()*25) + "px";
  heart.style.animationDuration = (4 + Math.random()*4) + "s";

  document.body.appendChild(heart);

  setTimeout(()=>heart.remove(),8000);
}

setInterval(createHeart, 200);

/* COUNTER */
function updateCounter(){
  const startDate = new Date("2026-05-09T00:00:00");
  const now = new Date();

  const diff = now - startDate;

  const days = Math.floor(diff / (1000*60*60*24));
  const hours = Math.floor((diff / (1000*60*60)) % 24);
  const minutes = Math.floor((diff / (1000*60)) % 60);
  const seconds = Math.floor((diff / 1000) % 60);

  document.getElementById("counter").innerHTML =
    `💞 Jesteśmy razem już:<br>${days} dni ${hours} godz. ${minutes} min. ${seconds} sek.`;
}

updateCounter();
setInterval(updateCounter, 1000);

</script>

</body>
</html>
