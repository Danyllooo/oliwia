<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kocham Cię Oliwia ❤️</title>

<style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
  }

  body {
    height: 100vh;
    background: linear-gradient(135deg, #ff4d6d, #ff8fab, #ffc2d1);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Tło blur */
  .bg-glow{
    position:absolute;
    width:500px;
    height:500px;
    background: rgba(255,255,255,0.15);
    filter: blur(120px);
    border-radius:50%;
    animation: pulse 5s infinite alternate;
  }

  @keyframes pulse{
    from{
      transform: scale(1);
    }
    to{
      transform: scale(1.3);
    }
  }

  /* Główna karta */
  .card{
    position: relative;
    z-index: 5;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    padding: 35px;
    border-radius: 30px;
    text-align:center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    border: 1px solid rgba(255,255,255,0.2);
    animation: floatCard 4s ease-in-out infinite;
  }

  @keyframes floatCard{
    0%,100%{
      transform: translateY(0px);
    }
    50%{
      transform: translateY(-10px);
    }
  }

  h1 {
    color: white;
    font-size: 3em;
    margin-bottom: 20px;
    text-shadow: 0 4px 10px rgba(0,0,0,0.3);
  }

  p{
    color:white;
    font-size:1.1em;
    margin-top:15px;
  }

  /* GIF kota */
  .cat{
    width: 220px;
    border-radius: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    transition: 0.4s;
  }

  .cat:hover{
    transform: scale(1.05) rotate(2deg);
  }

  .heart {
    position: absolute;
    color: white;
    animation: floatUp linear infinite;
    opacity: 0.7;
    pointer-events:none;
  }

  @keyframes floatUp {
    0% {
      transform: translateY(100vh) scale(1);
      opacity: 0;
    }
    20% {
      opacity: 1;
    }
    100% {
      transform: translateY(-10vh) scale(1.6);
      opacity: 0;
    }
  }

  .love-btn{
    margin-top:20px;
    border:none;
    background:white;
    color:#ff4d6d;
    padding:12px 25px;
    border-radius:30px;
    font-size:1em;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
  }

  .love-btn:hover{
    transform: scale(1.08);
    background:#ffe5ec;
  }

  /* Tekst po kliknięciu */
  #message{
    margin-top:15px;
    color:white;
    font-size:1.2em;
    opacity:0;
    transition:0.5s;
  }

</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="card">

  <h1>Kocham Cię Oliwia ❤️</h1>

  <!-- Słodki gif kota -->
  <img 
    class="cat"
    src="https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExcGhxajNycmt1ZnduZHJnb25jZXAyYXB1cWd4b2U4eTFoaHF6N2ppNCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/KztT2c4u8mYYUiMKdJ/giphy.gif"
    alt="Cute cat"
  >

  <p>Jesteś najpiękniejszą osobą na świecie 💖</p>

<div id="counter" style="
  color:white;
  font-size:1.2em;
  margin-top:15px;
  font-weight:bold;
">
</div>

  <a href="index2.html">
  <button herf="index2.html" class="love-btn">
    Kliknij ❤️
  </button>
</a>

  <div id="message">
    Kocham Cię coraz bardziej każdego dnia 🥺💕
  </div>

</div>

<script>

  function createHeart() {
    const heart = document.createElement("div");

    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (10 + Math.random() * 35) + "px";
    heart.style.animationDuration = (3 + Math.random() * 20) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 8000);
  }

  setInterval(createHeart, 200);

  function showLove(){
    const msg = document.getElementById("message");

    msg.style.opacity = "1";

    for(let i=0;i<25;i++){
      createHeart();
    }
  }


function updateCounter() {
  const startDate = new Date("2026-05-09T00:00:00");
  const now = new Date();

  const diff = now - startDate;

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((diff / (1000 * 60)) % 60);
  const seconds = Math.floor((diff / 1000) % 60);

  document.getElementById("counter").innerHTML =
    `💞 Jesteśmy razem już:<br>
     ${days} dni ${hours} godz. ${minutes} min. ${seconds} sek.`;
}

updateCounter();
setInterval(updateCounter, 1000);
</script>

</body>
</html>
