<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dla Ciebie ❤️</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
  color: white;
}

body{
  height:100vh;
  overflow:hidden;
  background:linear-gradient(135deg,#ff4d6d,#ff8fab,#ffc2d1);
}


.page{
  position:absolute;
  width:100%;
  height:100vh;
  display:none;
  justify-content:center;
  align-items:center;
}

.active{display:flex;}

/* karta */
  .card{
    position: relative;
    z-index: 5;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    padding: 35px;
    border-radius: 30px;
    text-align:center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    border: 1px solid rgba(255,255,255,0.2);
    animation: floatCard 4s ease-in-out infinite;
  }

  @keyframes floatCard{
    0%,100%{
      transform: translateY(0px);
    }
    50%{
      transform: translateY(-10px);
    }
  }


/* przyciski */
.buttons{
  position:relative;
  height:100px;
  margin-top:30px;
}

button{
  padding:15px 30px;
  border-radius:40px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  position:absolute;
  transition:0.2s ease;
}

#yes{
  background:white;
  color:#ff4d6d;
  left:-100px;
}

#no{
  background:red;
  color:white;
  right:-100px;
}

/* ❤️ NAPRAWIONE SERCE ZE ZDJĘĆ (TO BYŁ PROBLEM) */
.hearto{
  display:grid;
  grid-template-columns:repeat(5, 80px);
  justify-content:center;
  gap:8px;
  margin:25px auto;
}

/* zdjęcia BEZ ZMIANY NAZW */
.hearto img{
  width:75px;
  height:75px;
  object-fit:cover;
  border-radius:15px;
  border:3px solid white;
  box-shadow:0 0 15px rgba(255,255,255,0.6);
  cursor:pointer;
}

/* układ SERCA (ważne – teraz stabilne) */
.img1{grid-column:2;}
.img2{grid-column:3;}
.img3{grid-column:4;}

.img4{grid-column:1;}
.img5{grid-column:2;}
.img6{grid-column:3;}
.img7{grid-column:4;}
.img8{grid-column:5;}

.img9{grid-column:1;}
.img10{grid-column:2;}
.img11{grid-column:3;}
.img12{grid-column:4;}
.img13{grid-column:5;}

.img14{grid-column:2;}
.img15{grid-column:3;}
.img16{grid-column:4;}

.img17{grid-column:3;}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.lightbox img{
  width:80%;
  max-width:500px;
  border-radius:20px;
  border:4px solid white;
  box-shadow:0 0 30px rgba(255,255,255,0.5);
}

/* SERCA W TLE */
.heart{
  position:absolute;
  color:white;
  opacity:0.7;
  pointer-events:none;
  animation: floatUp linear forwards;
}

@keyframes floatUp {
  0% {transform: translateY(100vh) scale(1); opacity:0;}
  20% {opacity:1;}
  100% {transform: translateY(-10vh) scale(1.6); opacity:0;}
}

.cat{
  width: 220px;
  border-radius: 20px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.25);
  transition: 0.4s;
}

</style>
</head>

<body>

<!-- STRONA 1 -->
<div class="page active" id="page1">
  <div class="card">
    <h1>Oliwia ❤️</h1>
    <p>Kochasz mnie?</p>
  <img 
    class="cat"
    src="https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExbzNsMG1keTI4emxpbzVpanlwcWdrNW81eGI1emJ0cWFwandpanN5aSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/vPzbDN4rBxuvtpSpzF/giphy.gif"
    alt="Cute cat"
  >
    <div class="buttons">
      <button id="yes">TAK ❤️</button>
      <button id="no">NIE 😢</button>
    </div>
  </div>
</div>

<!-- STRONA 2 -->
<div class="page" id="page2">
  <div style="text-align:center">

    <h1 style="color:white;">Jesteś dla mnie wszystkim 💖</h1>

    <div class="hearto">

      <img src="1.jpg" class="img1">
      <img src="" class="img3">

      <img src="3.jpg" class="img4">
      <img src="4.jpg" class="img5">
      <img src="8.png" class="img6">
      <img src="14.jpg" class="img7">
      <img src="ja.png" class="img8">

      <img src="6.png" class="img9">
      <img src="12.jpg" class="img10">
      <img src="10.png" class="img11">
      <img src="13.png" class="img12">
      <img src="13.jpg" class="img13">

      <img src="2.png" class="img14">
      <img src="9.png" class="img15">
      <img src="" class="img16">

      <img src="7.png" class="img17">

    </div>

    <h1 style="color:white;">
      Nie potrzebuję nic więcej.<br>
      Wystarczy, że jesteś i się uśmiechasz 🥺❤️
    </h1>

  </div>
</div>

<script>

const yes = document.getElementById("yes");
let moves = 0;

/* YES UCIEKA 20 RAZY */
yes.addEventListener("mouseover", ()=>{

  if(moves < 30){
    const x = Math.random()*300 - 150;
    const y = Math.random()*200 - 150;
    yes.style.transform = `translate(${x}px, ${y}px)`;
    moves++;
  }
});

/* PRZEJŚCIE */
yes.onclick = ()=>{
  document.getElementById("page1").classList.remove("active");
  document.getElementById("page2").classList.add("active");
};

/* LIGHTBOX */
document.querySelectorAll(".hearto img").forEach(img=>{
  img.addEventListener("click", ()=>{
    const box = document.createElement("div");
    box.className = "lightbox";

    const big = document.createElement("img");
    big.src = img.src;

    box.appendChild(big);
    document.body.appendChild(box);

    box.addEventListener("click", ()=>box.remove());
  });
});

/* SERCA W TLE */
function createHeart(){
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";

  heart.style.left = Math.random()*100 + "vw";
  heart.style.fontSize = (10 + Math.random()*30) + "px";
  heart.style.animationDuration = (4 + Math.random()*5) + "s";

  document.body.appendChild(heart);

  setTimeout(()=>heart.remove(),9000);
}

setInterval(createHeart,250);

</script>

</body>
</html>
